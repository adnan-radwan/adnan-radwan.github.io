<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض الإعلان — GOLDEN ADS</title>

  <link rel="stylesheet" href="/ad-view/ad-view.css">
</head>

<body>

  <!-- HERO -->
  <section class="ga-ad-hero">
    <h1 id="adTitle" class="ga-ad-title"></h1>
    <p class="ga-ad-meta">
      <span id="adPrice"></span> • 
      <span id="adLocation"></span> • 
      <span id="adCategory"></span>
    </p>
  </section>

  <!-- صورة الإعلان -->
  <section class="ga-ad-image-box">
    <img id="adImage" class="ga-ad-image" src="/ad-view/no-image.png" alt="Ad Image">
  </section>

  <!-- وصف الإعلان -->
  <section class="ga-ad-description-box">
    <h2>وصف الإعلان</h2>
    <p id="adDescription" class="ga-ad-description"></p>
  </section>

  <!-- إعلانات مشابهة -->
  <section class="ga-similar-section">
    <h2>إعلانات مشابهة</h2>
    <div id="similarGrid" class="cat-grid"></div>
  </section>

  <!-- سكربتات النظام الموحد -->
  <script src="/ad-view/adsDB.js"></script>
  <script src="/ad-view/categoriesDB.js"></script>
  <script src="/ad-view/golden-core.js"></script>
  <script src="/ad-view/ad-view.js"></script>

</body>
</html>
